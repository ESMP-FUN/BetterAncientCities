name: BetterAncientCities
version: '${version}'
main: com.esmpfun.betterancientcities.BetterAncientCities
api-version: '1.21'
folia-supported: true
authors: [darkstarworks]
description: Turns naturally-generated Ancient Cities into renewable, multiplayer-friendly content — auto-discovery, per-player chest loot, griefing protection, and (later) automatic resets.
website: https://github.com/ESMP-FUN/BetterAncientCities

commands:
  ancient:
    description: Better Ancient Cities admin command
    usage: /ancient <subcommand>
    aliases: [bac, acp, ancientcity, betterancientcities]
    permission: bac.admin

permissions:
  bac.admin:
    description: Access to all BetterAncientCities admin commands
    default: op
  bac.discovery.notify:
    description: Receive in-game notifications when an Ancient City is auto-discovered
    default: op
  bac.bypass.protection:
    description: Bypass Ancient City griefing protection (break/place freely)
    default: op

  # Legacy pre-2.0 aliases
  acp.admin:
    description: Legacy alias of bac.admin
    default: false
    children:
      bac.admin: true
  acp.discovery.notify:
    description: Legacy alias of bac.discovery.notify
    default: false
    children:
      bac.discovery.notify: true
  acp.bypass.protection:
    description: Legacy alias of bac.bypass.protection
    default: false
    children:
      bac.bypass.protection: true
